  - - TextContainer
    - - - "\u2022 First install Vim.\n"
        - - 0 21 9.96 0.00
      - - "\u2022 To install the packages, first install \u2018vundle\u2019 using\
          \ following command. Use \u2018git-shell\u2019 to run this command\n"
        - - 0 111 9.96 0.00
  - - TextContainer
    - - - 'in Windows.

          '
        - - 0 12 9.96 0.00
  - - TextContainer
    - - - 'git clone https://github.com/VundleVim/Vundle.vim.git ~/.vim/bundle/Vundle.vim

          '
        - - 0 79 8.97 0.00
  - - TextContainer
    - - - '(in Windows : use ''git-shell'' to run below command)

          '
        - - 0 52 8.97 0.00
      - - 'git clone https://github.com/VundleVim/Vundle.vim.git C:/Users/<Username>/.vim/bundle/

          '
        - - 0 87 8.97 0.00
      - - "\u02D3\u2192Vundle.vim\n"
        - - 0 2 4.98 0.00
          - 2 13 8.97 0.97
  - - TextContainer
    - - - "\u2022 Copy and paste the .vimrc file in the home directory.\n"
        - - 0 56 9.96 0.00
      - - "\u2022 In Windows, paste in the .vimrc file at C:/Users/<Username>/; and\
          \ change the line \u201Cset rtp+= . . . \u201D in .vimrc\n"
        - - 0 113 9.96 0.00
  - - TextContainer
    - - - "with correct location of \u201CVundle.vim\u201D i.e. \u201Cset rtp+=C:/Users/<Username>/.vim/bundle/Vundle.vim\u201D\
          .\n"
        - - 0 98 9.96 0.00
  - - TextContainer
    - - - "\u2022 Use double quote to comment/uncomment the packages in .vimrc file\
          \ e.g. \u201D Plugin \u2018mattn/emmet-vim\u2019 will\n"
        - - 0 105 9.96 0.00
  - - TextContainer
    - - - "not install the package \u201Cemmet-vim\u201D. Or add some more packages\
          \ in .vimrc file as required.\n"
        - - 0 91 9.96 0.00
  - - TextContainer
    - - - "\u2022 After selecting the packages, open vim and run the command -> :PluginInstall\
          \ and it will install the all the\n"
        - - 0 111 9.96 0.00
  - - TextContainer
    - - - 'plugins.

          '
        - - 0 9 9.96 0.00
